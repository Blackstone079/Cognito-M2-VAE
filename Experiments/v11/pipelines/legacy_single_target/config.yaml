# experiments/config_m2.yaml

db:
  path: data/raw/epshteins_list.db
  include_drugbank_text: false

label:
  column: protox_toxclass
  policy:
    name: merge_i_ii       # options: strict_6_class | merge_i_ii | drop_min_count
    min_count: 0           # used only when policy.name == drop_min_count
  unknown_value: -1

split:
  seed: 0
  frac_train: 0.7
  frac_val: 0.15

featurizer:
  fp_bits: 2048
  fp_radius: 2
  feature_id: v1

training:
  seed: 0
  device: cpu             # cpu | cuda
  batch_size: 256
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  alpha_ce: 1.0
  lambda_unl: 1.0
  grad_clip: 5.0
  patience: 10

model:
  z_dim: 32
  clf_hidden: [512, 256]
  enc_hidden: [512, 256]
  dec_hidden: [512, 256]
  dropout: 0.1
